name: Auto Release

on:
  push:
    branches: [main]
    paths: [module.prop]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: version
        run: |
          version=$(grep '^version=' module.prop | cut -d'=' -f2-)
          versionCode=$(grep '^versionCode=' module.prop | cut -d'=' -f2-)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "versionCode=$versionCode" >> "$GITHUB_OUTPUT"

      - name: Build Android daemon
        shell: bash
        run: |
          rustup target add aarch64-linux-android
          ndk_root="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-}}"
          if [ -z "$ndk_root" ] || [ ! -d "$ndk_root/toolchains/llvm/prebuilt/linux-x86_64" ]; then
            ndk_version="$(find "$ANDROID_SDK_ROOT/ndk" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V | tail -1)"
            ndk_root="$ANDROID_SDK_ROOT/ndk/$ndk_version"
          fi
          toolchain="$ndk_root/toolchains/llvm/prebuilt/linux-x86_64/bin"
          test -x "$toolchain/aarch64-linux-android26-clang"
          cargo test --locked --manifest-path native/coronad/Cargo.toml
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$toolchain/aarch64-linux-android26-clang" \
            cargo build --locked --release --target aarch64-linux-android \
            --manifest-path native/coronad/Cargo.toml
          install -Dm 0755 native/coronad/target/aarch64-linux-android/release/coronad bin/coronad
          "$toolchain/llvm-readelf" -h bin/coronad | grep 'AArch64' >/dev/null
          "$toolchain/llvm-readelf" -l bin/coronad | grep '/system/bin/linker64' >/dev/null

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-v:refname | head -1)
          if [ -n "$prev_tag" ]; then
            log=$(git log "$prev_tag"..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- bump:" | grep -v "^- update:")
          else
            log=$(git log --pretty=format:"- %s" --no-merges -20 | grep -v "^- bump:" | grep -v "^- update:")
          fi
          [ -z "$log" ] && log="- 版本更新"
          : > changelog.md
          printf "# Corona %s\n\n%s\n" "${{ steps.version.outputs.version }}" "$log" > changelog.md

      - name: Build zip
        shell: bash
        run: |
          package_dir="$RUNNER_TEMP/corona-package"
          mkdir -p "$package_dir"
          git archive HEAD | tar -x -C "$package_dir"
          rm -rf "$package_dir/.github" "$package_dir/native" "$package_dir/docs"
          rm -f "$package_dir/.gitignore" "$package_dir/LICENSE" "$package_dir/README.md" \
            "$package_dir/changelog.md" "$package_dir/update.json" "$package_dir/bin/coronad"
          install -Dm 0755 bin/coronad "$package_dir/bin/coronad"
          find "$package_dir" -type f -name '*.log' -delete
          (cd "$package_dir" && zip -r "$GITHUB_WORKSPACE/Corona-${{ steps.version.outputs.version }}.zip" .)
          unzip -Z1 "Corona-${{ steps.version.outputs.version }}.zip" | grep -qx 'module.prop'
          unzip -Z1 "Corona-${{ steps.version.outputs.version }}.zip" | grep -qx 'bin/coronad'
          if unzip -Z1 "Corona-${{ steps.version.outputs.version }}.zip" | grep -Eq '^(native|docs|\.github)/'; then
            echo "Unexpected development files in release package" >&2
            exit 1
          fi

      - name: Update update.json and changelog
        run: |
          printf '{\n  "version": "%s",\n  "versionCode": %s,\n  "zipUrl": "https://github.com/%s/releases/download/%s/Corona-%s.zip",\n  "changelog": "https://raw.githubusercontent.com/%s/main/changelog.md"\n}\n' \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.versionCode }}" \
            "${{ github.repository }}" \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.version.outputs.version }}" \
            "${{ github.repository }}" > update.json
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add update.json changelog.md
          if ! git diff --cached --quiet; then
            git commit -m "update: ${{ steps.version.outputs.version }}"
            git push
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.version.outputs.version }}" -y 2>/dev/null || true
          gh release create "${{ steps.version.outputs.version }}" \
            "Corona-${{ steps.version.outputs.version }}.zip" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file changelog.md
